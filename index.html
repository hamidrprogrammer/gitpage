<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروکسی وب ساده</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            background: #1a1a2e;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        input, button {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            margin: 5px;
        }
        input {
            width: 70%;
            background: #16213e;
            color: white;
        }
        button {
            background: #0f3460;
            color: white;
            cursor: pointer;
        }
        iframe {
            width: 100%;
            height: 70vh;
            margin-top: 20px;
            border: 1px solid #333;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 پروکسی وب ساده (آزمایشی)</h1>
        <p>⚠️ توجه: این فقط یک پروکسی ساده برای نمایش است و نمی‌تواند امنیت کامل VPN را فراهم کند</p>
        <input type="text" id="urlInput" placeholder="آدرس سایت مورد نظر (مثال: https://example.com)">
        <button onclick="loadSite()">برو</button>
        <iframe id="proxyFrame" src="about:blank"></iframe>
    </div>

    <script>
        function loadSite() {
            let url = document.getElementById('urlInput').value;
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            document.getElementById('proxyFrame').src = url;
        }
    </script>
</body>
</html>
